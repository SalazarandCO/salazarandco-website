<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBIICA — Development & Realty</title>
<meta name="description" content="UBIICA — Miami-based real estate development and brokerage. Co-founded by Alex Salazar and Rodrigo Gana.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   UBIICA SPLASH — White canvas, cinematic
   logo entrance, two doors (Dev / Realty)
   ═══════════════════════════════════════════ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #0a0a0a;
  --white: #ffffff;
  --gray: rgb(88, 88, 88);
  --gray-light: rgb(200, 200, 200);
  --font: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  width: 100%;
}

html { cursor: none; font-variant-emoji: text; }

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--black);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  letter-spacing: -0.18px;
}


/* ─── LOGO STAGE ─── */
.stage {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 1410px;
  padding: 0 30px;
  gap: 80px;
  transition: gap 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ─── WORDMARK ─── */
.wordmark {
  display: flex;
  align-items: baseline;
  font-family: var(--font);
  font-size: clamp(80px, 16vw, 220px);
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.06em;
  color: var(--black);
  text-transform: uppercase;
  user-select: none;
  white-space: nowrap;
  margin: 0;
}

.wordmark .letter {
  display: inline-block;
  opacity: 0;
  transform: scale(1.5);
  filter: blur(2px);
  will-change: opacity, transform, filter;
}

/* Cinematic letter-by-letter entrance */
.cinematic .letter {
  animation: cinematic 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.cinematic .letter:nth-child(1) { animation-delay: 0.2s; }
.cinematic .letter:nth-child(2) { animation-delay: 0.45s; }
.cinematic .letter:nth-child(3) { animation-delay: 0.7s; }
.cinematic .letter:nth-child(4) { animation-delay: 0.95s; }
.cinematic .letter:nth-child(5) { animation-delay: 1.2s; }
.cinematic .letter:nth-child(6) { animation-delay: 1.45s; }

@keyframes cinematic {
  0% { opacity: 0; transform: scale(1.5); filter: blur(2px); }
  60% { opacity: 1; filter: blur(0); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

/* Skip animation: letters instantly visible (for return visits) */
.skip-animation .letter {
  opacity: 1;
  transform: scale(1);
  filter: blur(0);
}


/* ─── TAGLINE ─── */
.tagline {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 400;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 3px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1) 2.7s, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1) 2.7s;
}
.tagline.show { opacity: 1; transform: translateY(0); }
.skip-animation .tagline {
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0s;
}
.tagline .icon-star { font-size: 12px; color: var(--black); }
.tagline .divider {
  width: 24px;
  height: 1px;
  background: var(--gray-light);
}


/* ─── DOORS ─── */
.doors {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  width: 100%;
  max-width: 1100px;
  border-top: 1px solid var(--gray-light);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1) 3.1s, transform 1s cubic-bezier(0.16, 1, 0.3, 1) 3.1s;
  pointer-events: none;
}
.doors.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.skip-animation .doors {
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0s;
  pointer-events: auto;
}

.door {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  text-decoration: none;
  color: var(--black);
  font-family: var(--font);
  cursor: none;
  overflow: hidden;
  transition: color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  isolation: isolate;
}
.door + .door {
  border-left: 1px solid var(--gray-light);
}

/* Ink-fill on hover */
.door::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--black);
  transform: translateY(101%);
  transition: transform 0.65s cubic-bezier(0.77, 0, 0.175, 1);
  z-index: -1;
}
.door:hover::before {
  transform: translateY(0);
}
.door:hover {
  color: var(--white);
}

.door-label {
  font-size: clamp(36px, 6vw, 72px);
  font-weight: 500;
  letter-spacing: -0.04em;
  line-height: 0.95;
  text-transform: uppercase;
  transition: letter-spacing 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.door:hover .door-label {
  letter-spacing: -0.02em;
}

.door-sub {
  margin-top: 16px;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  transition: color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.door:hover .door-sub {
  color: rgba(255,255,255,0.65);
}

.door-arrow {
  position: absolute;
  top: 24px;
  right: 28px;
  width: 18px;
  height: 18px;
  opacity: 0.4;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.door:hover .door-arrow {
  opacity: 1;
  transform: translate(2px, -2px);
}
.door-arrow svg {
  width: 100%;
  height: 100%;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}


/* ─── FOOTER MARK ─── */
.footer-mark {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  opacity: 0;
  transition: opacity 1.2s ease 3.6s;
}
.footer-mark.show { opacity: 0.7; }
.skip-animation .footer-mark {
  opacity: 0.7;
  transition-delay: 0s;
}


/* ─── CUSTOM CURSOR ─── */
.cursor-dot {
  position: fixed; top: 0; left: 0;
  width: 8px; height: 8px;
  background: var(--black);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, background 0.2s, opacity 0.3s;
  opacity: 0;
  mix-blend-mode: difference;
}
.cursor-ring {
  position: fixed; top: 0; left: 0;
  width: 32px; height: 32px;
  border: 1px solid rgba(10,10,10,0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s, opacity 0.3s;
  opacity: 0;
}
.cursor-dot.visible, .cursor-ring.visible { opacity: 1; }
.cursor-dot.hover { width: 4px; height: 4px; background: var(--white); }
.cursor-ring.hover { width: 60px; height: 60px; border-color: rgba(10,10,10,0.6); }

@media (hover: none) and (pointer: coarse) {
  html { cursor: auto !important; }
  .cursor-dot, .cursor-ring { display: none !important; }
}


/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .stage { gap: 48px; padding: 0 20px; }
  .doors { grid-template-columns: 1fr; max-width: 480px; }
  .door + .door { border-left: none; border-top: 1px solid var(--gray-light); }
  .door { padding: 40px 24px; }
  .tagline { font-size: 11px; letter-spacing: 2px; gap: 8px; }
  .tagline .divider { width: 16px; }
}


/* ─── REDUCED MOTION ─── */
@media (prefers-reduced-motion: reduce) {
  .cinematic .letter,
  .tagline,
  .doors,
  .footer-mark {
    animation: none !important;
    transition: none !important;
    opacity: 1 !important;
    transform: none !important;
    filter: none !important;
  }
}
</style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="stage" id="stage">
  <h1 class="wordmark cinematic" id="wordmark" aria-label="UBIICA">
    <span class="letter">U</span><span class="letter">B</span><span class="letter">I</span><span class="letter">I</span><span class="letter">C</span><span class="letter">A</span>
  </h1>

  <div class="tagline" id="tagline">
    <span class="icon-star">&#x2726;</span>
    <span>Development</span>
    <span class="divider"></span>
    <span>Realty</span>
    <span class="divider"></span>
    <span>Miami</span>
  </div>

  <nav class="doors" id="doors" aria-label="Choose practice">
    <a href="development/" class="door">
      <span class="door-arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M9 7h8v8"/></svg></span>
      <span class="door-label">Development</span>
      <span class="door-sub">Build with us</span>
    </a>
    <a href="realty/" class="door">
      <span class="door-arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M9 7h8v8"/></svg></span>
      <span class="door-label">Realty</span>
      <span class="door-sub">Buy, sell, invest</span>
    </a>
  </nav>
</div>

<div class="footer-mark" id="footerMark">&copy; UBIICA 2026 &middot; 1000 Brickell Ave Miami FL</div>


<script>
(function() {
  // ─── First-visit vs return-visit logic ───
  var stage = document.getElementById('stage');
  var wordmark = document.getElementById('wordmark');
  var tagline = document.getElementById('tagline');
  var doors = document.getElementById('doors');
  var footerMark = document.getElementById('footerMark');

  var hasVisited = false;
  try { hasVisited = localStorage.getItem('ubiica_visited') === '1'; } catch (e) {}

  if (hasVisited) {
    // Skip animation entirely
    document.body.classList.add('skip-animation');
  } else {
    // First visit: run cinematic entrance, then reveal doors
    // Tagline shows after letters settle (~2.6s)
    setTimeout(function() { tagline.classList.add('show'); }, 50);
    // Doors fade in after tagline (~3s)
    setTimeout(function() { doors.classList.add('show'); }, 50);
    // Footer mark appears last (~3.5s)
    setTimeout(function() { footerMark.classList.add('show'); }, 50);

    // Set cookie so return visits skip
    try { localStorage.setItem('ubiica_visited', '1'); } catch (e) {}
  }


  // ─── Custom cursor ───
  var dot = document.getElementById('cursorDot');
  var ring = document.getElementById('cursorRing');
  var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!isTouch && dot && ring) {
    var mouseX = -100, mouseY = -100;
    var ringX = -100, ringY = -100;
    var visible = false;

    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX; mouseY = e.clientY;
      if (!visible) {
        visible = true;
        dot.classList.add('visible');
        ring.classList.add('visible');
      }
      dot.style.left = mouseX + 'px';
      dot.style.top = mouseY + 'px';
    });

    function animateRing() {
      ringX += (mouseX - ringX) * 0.18;
      ringY += (mouseY - ringY) * 0.18;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    var hoverTargets = 'a, button, [role="button"]';
    document.addEventListener('mouseover', function(e) {
      if (e.target.closest(hoverTargets)) {
        dot.classList.add('hover');
        ring.classList.add('hover');
      }
    });
    document.addEventListener('mouseout', function(e) {
      if (e.target.closest(hoverTargets)) {
        dot.classList.remove('hover');
        ring.classList.remove('hover');
      }
    });
    document.addEventListener('mouseleave', function() {
      dot.classList.remove('visible'); ring.classList.remove('visible'); visible = false;
    });
    document.addEventListener('mouseenter', function() {
      dot.classList.add('visible'); ring.classList.add('visible'); visible = true;
    });
  }


  // ─── Reset visit memory on demand (for debugging — append ?reset to URL) ───
  if (window.location.search.indexOf('reset') !== -1) {
    try { localStorage.removeItem('ubiica_visited'); } catch (e) {}
    window.location.href = window.location.pathname;
  }
})();
</script>

</body>
</html>
